<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invio Ordini Tavoli</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #e74c3c;
            --bg: #f8f9fa;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 15px;
            color: #333;
        }
        
        /* SCHERMATA DI LOGIN */
        #login-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #1a252f;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }
        .login-box {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 320px;
            width: 100%;
        }
        .login-box h3 { margin-top: 0; color: var(--primary); }
        .login-box input { margin-bottom: 15px; text-align: center; font-size: 18px; width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
        .btn-login { background: #2ecc71; color: white; font-weight: bold; border: none; cursor: pointer; padding: 12px; width: 100%; border-radius: 8px; font-size: 16px; }

        /* CONTENITORE PRINCIPALE (Nascosto prima del login) */
        #app-content { display: none; }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h2 { text-align: center; color: var(--primary); margin-top: 0; cursor: pointer; user-select: none; }
        
        .row { display: flex; gap: 10px; margin-bottom: 15px; }
        .flex-2 { flex: 2; }
        .flex-1 { flex: 1; }
        .full-width { width: 100%; margin-bottom: 15px; }
        
        label { font-weight: bold; display: block; margin-bottom: 5px; font-size: 14px; }
        select, input, button {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 16px;
        }
        
        .ordine-riga {
            background: #f1f3f5;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 10px;
            position: relative;
        }
        
        .btn-add { background: #2ecc71; color: white; border: none; font-weight: bold; cursor: pointer; }
        .btn-remove { background: #e74c3c; color: white; border: none; font-weight: bold; height: 100%; cursor: pointer; }
        .btn-invia { background: var(--primary); color: white; border: none; font-weight: bold; font-size: 18px; padding: 15px; margin-top: 15px; cursor: pointer; }
        
        /* PANNELLO CONFIGURAZIONE (Nascosto di default) */
        #config-stampante {
            display: none;
            background: #e9ecef;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 12px;
        }

        .btn-reset-num {
            background-color: #e67e22;
            color: white;
            border: none;
            font-weight: bold;
            padding: 8px;
            font-size: 13px;
            margin-top: 8px;
            cursor: pointer;
        }

        /* SEZIONE FINE SERATA */
        .sezione-resoconto {
            margin-top: 25px;
            padding: 15px;
            background: #fdfefe;
            border: 2px dashed #bdc3c7;
            border-radius: 8px;
        }
        .sezione-resoconto h4 { margin: 0 0 10px 0; color: #7f8c8d; text-align: center; }
        .btn-vedi-resoconto { background: #95a5a6; color: white; border: none; margin-bottom: 8px; font-weight: bold; cursor: pointer; }
        .btn-stampa-totale { background: #9b59b6; color: white; border: none; font-weight: bold; cursor: pointer; }

        #orologio {
            text-align: center;
            font-weight: bold;
            color: #7f8c8d;
            margin-top: 20px;
            font-size: 14px;
            background: #eee;
            padding: 8px;
            border-radius: 6px;
        }
    </style>
</
