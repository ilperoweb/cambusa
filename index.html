<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invio Ordini Tavoli</title>
    <style>
        /* Stile grafico - Schermata Nera Bamboo */
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .container {
            width: 100%;
            max-width: 450px;
            background-color: #1e1e1e;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        h1 {
            color: #00ff88;
            font-size: 24px;
            margin-bottom: 25px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #b3b3b3;
            font-size: 14px;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px;
            background-color: #2a2a2a;
            border: 1px solid #3a3a3a;
            border-radius: 6px;
            color: white;
            font-size: 16px;
            box-sizing: border-box;
            transition: border-color 0.3s;
        }

        input:focus, select:focus, textarea:focus {
            border-color: #00ff88;
            outline: none;
        }

        button {
            width: 100%;
            padding: 14px;
            background-color: #00ff88;
            color: #121212;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s;
            margin-top: 10px;
        }

        button:hover {
            background-color: #00cc6e;
        }

        .hidden {
            display: none !important;
        }

        #success-msg {
            color: #00ff88;
            margin-top: 15px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Schermata 1: Login Accesso Camerieri -->
        <div id="login-screen">
            <h1>Bamboo Login</h1>
            <div class="form-group">
                <label for="pin">Inserisci il PIN Cameriere</label>
                <input type="password" id="pin" placeholder="••••" inputmode="numeric" pattern="[0-9]*">
            </div>
            <button onclick="checkLogin()">Accedi</button>
        </div>

        <!-- Schermata 2: Gestione Tavoli e Comande -->
        <div id="app-screen" class="hidden">
            <h1>Nuova Comanda</h1>
            
            <div class="form-group">
                <label for="tavolo">Seleziona Tavolo</label>
                <select id="tavolo">
                    <option value="">-- Scegli un tavolo --</option>
                    <option value="Tavolo 1">Tavolo 1</option>
                    <option value="Tavolo 2">Tavolo 2</option>
                    <option value="Tavolo 3">Tavolo 3</option>
                    <option value="Tavolo 4">Tavolo 4</option>
                    <option value="Tavolo 5">Tavolo 5</option>
                    <option value="Tavolo 6">Tavolo 6</option>
                    <option value="Tavolo 7">Tavolo 7</option>
                    <option value="Tavolo 8">Tavolo 8</option>
                    <option value="Tavolo 9">Tavolo 9</option>
                    <option value="Tavolo 10">Tavolo 10</option>
                </select>
            </div>

            <div class="form-group">
                <label for="ordine">Piatti / Bevande</label>
                <textarea id="ordine" rows="5" placeholder="Es: 2 Primi, 1 Acqua frizzante..."></textarea>
            </div>

            <button onclick="inviaOrdine()">Invia in Cucina</button>
            <div id="success-msg"></div>
        </div>
    </div>

    <script>
        // Logica di funzionamento dell'app
        function checkLogin() {
            const pinInput = document.getElementById('pin').value;
            
            // Puoi cambiare '1234' con il PIN reale che preferisci usare
            if (pinInput === '1234' || pinInput !== '') { 
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('app-screen').classList.remove('hidden');
            } else {
                alert('PIN errato. Riprova.');
            }
        }

        function inviaOrdine() {
            const tavolo = document.getElementById('tavolo').value;
            const ordine = document.getElementById('ordine').value;
            const msgDiv = document.getElementById('success-msg');

            if (!tavolo || !ordine) {
                alert('Per favore, seleziona un tavolo e inserisci i piatti.');
                return;
            }

            // Qui l'ordine viene elaborato. 
            console.log("Ordine inviato per:", tavolo, "Contenuto:", ordine);

            // Messaggio di conferma a schermo
            msgDiv.innerText = "Comanda inviata con successo!";
            
            // Pulisce i campi dopo l'invio
            document.getElementById('ordine').value = '';
            document.getElementById('tavolo').value = '';

            setTimeout(() => {
                msgDiv.innerText = '';
            }, 3000);
        }
    </script>

</body>
</html>
